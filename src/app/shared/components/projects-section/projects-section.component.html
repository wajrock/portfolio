<div class="projects">
  <div class="projects-carousel" #projectsCarousel (scroll)="updateButtonStates()">
    @for (project of projects; track project.name) {
      <app-project-card class="project" [projectInfos]="project"></app-project-card>
    }
  </div>
  <div class="footer">
    <div class="navigations">
      <app-button
        (action)="navigateProjects(SCROLL_DIRECTION.LEFT)"
        [btnStyles]="['border']"
        [disabledButton]="disablePreviousButton()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" fill="none">
          <path
            d="M10.9987 4.5835L4.58203 11.0002L10.9987 17.4168M4.58203 11.0002H17.4154"
            stroke="#0F172A"
            stroke-width="1.83333"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </app-button>
      <app-button
        (action)="navigateProjects(SCROLL_DIRECTION.RIGHT)"
        [btnStyles]="['border']"
        [disabledButton]="disabledNextButton()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" fill="none">
          <path
            d="M4.58203 11.0002H17.4154M10.9987 17.4168L17.4154 11.0002L10.9987 4.5835"
            stroke="#0F172A"
            stroke-width="1.83333"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </app-button>
    </div>
    <div class="links">
      <app-button [link]="'https://github.com/wajrock'" [btnStyles]="['border']">
