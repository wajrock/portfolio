@switch (languageIcon()) {
  @case (LANGUAGE.ANGULAR) {
    <svg siAngularIcon></svg>
  }
  @case (LANGUAGE.TYPESCRIPT) {
    <svg siTypescriptIcon></svg>
  }
  @case (LANGUAGE.SASS) {
    <svg siSassIcon></svg>
  }
  @case (LANGUAGE.JIRA) {
    <svg siJiraIcon></svg>
  }
  @case (LANGUAGE.FIGMA) {
    <svg siFigmaIcon></svg>
  }
  @case (LANGUAGE.DOCKER) {
    <svg siDockerIcon></svg>
  }
}
